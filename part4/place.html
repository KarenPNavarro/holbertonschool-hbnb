<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="View detailed information about an HBnB place."
    >
    <title>HBnB - Place Details</title>
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand-link" href="index.html" aria-label="HBnB home">
                <img class="logo" src="images/logo.png" alt="HBnB logo">
            </a>

            <ul class="nav-links">
                <li>
                    <a class="nav-link" href="index.html">Places</a>
                </li>
                <li>
                    <a
                        id="login-link"
                        class="login-button"
                        href="login.html"
                    >
                        Login
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <p
            id="place-message"
            class="places-message"
            role="status"
            aria-live="polite"
        >
            Loading place details...
        </p>

        <section
            id="place-details"
            class="place-details"
            aria-label="Place details"
        ></section>

        <section id="add-review" class="add-review-link" hidden>
            <a
                id="add-review-link"
                class="details-button"
                href="add_review.html"
            >
                Add a Review
            </a>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
