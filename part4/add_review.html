<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Add a review for an HBnB place."
    >
    <title>HBnB - Add Review</title>
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand-link" href="index.html" aria-label="HBnB home">
                <img class="logo" src="images/logo.png" alt="HBnB logo">
            </a>

            <ul class="nav-links">
                <li>
                    <a class="nav-link" href="index.html">Places</a>
                </li>
                <li>
                    <a
                        id="login-link"
                        class="login-button"
                        href="login.html"
                    >
                        Login
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="add-review" class="add-review">
            <h1>Add a Review</h1>
            <p>Share your experience with other guests.</p>

            <form id="review-form" class="form">
                <div class="form-group">
                    <label for="place-name">Place</label>
                    <input
                        id="place-name"
                        name="place-name"
                        type="text"
                        value="Loading place..."
                        readonly
                    >
                </div>

                <div class="form-group">
                    <label for="review-text">Your review</label>
                    <textarea
                        id="review-text"
                        name="text"
                        placeholder="Describe your experience..."
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="">Select a rating</option>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very good</option>
                        <option value="3">3 - Good</option>
                        <option value="2">2 - Fair</option>
                        <option value="1">1 - Poor</option>
                    </select>
                </div>

                <p
                    id="review-message"
                    class="form-message"
                    role="status"
                    aria-live="polite"
                ></p>

                <button class="primary-button" type="submit">
                    Submit Review
                </button>

                <a
                    id="back-to-place"
                    class="secondary-button"
                    href="index.html"
                >
                    Back to Place
                </a>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
