<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your HBnB account.">
    <title>HBnB - Login</title>
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand-link" href="index.html" aria-label="HBnB home">
                <img class="logo" src="images/logo.png" alt="HBnB logo">
            </a>

            <ul class="nav-links">
                <li><a class="nav-link" href="index.html">Places</a></li>
                <li><a class="login-button" href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-page">
        <section class="login-container">
            <h1>Welcome Back</h1>
            <p>Enter your account information to continue.</p>

            <form
                id="login-form"
                class="login-form"
                action="#"
                method="post"
            >
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        autocomplete="email"
                        placeholder="name@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <p
                    id="login-error"
                    class="error-message"
                    role="alert"
                    aria-live="polite"
                ></p>

                <button class="primary-button" type="submit">
                    Login
                </button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
