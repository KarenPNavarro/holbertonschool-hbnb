<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse available places on HBnB.">
    <title>HBnB - Places</title>
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand-link" href="index.html" aria-label="HBnB home">
                <img class="logo" src="images/logo.png" alt="HBnB logo">
            </a>

            <ul class="nav-links">
                <li>
                    <a class="nav-link" href="index.html">Places</a>
                </li>
                <li>
                    <a
                        id="login-link"
                        class="login-button"
                        href="login.html"
                    >
                        Login
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Find your next stay</h1>
                <p>
                    Discover comfortable and memorable places for your next trip.
                </p>
            </div>
        </section>

        <section class="container places-section">
            <h2>Available Places</h2>

            <div class="filter-container">
                <label for="price-filter">Maximum price per night:</label>

                <select id="price-filter" name="price-filter">
                    <option value="10">$10</option>
                    <option value="50">$50</option>
                    <option value="100">$100</option>
                    <option value="all" selected>All</option>
                </select>
            </div>

            <p
                id="places-message"
                class="places-message"
                role="status"
                aria-live="polite"
            >
                Loading places...
            </p>

            <section
                id="places-list"
                class="places-grid"
                aria-label="List of places"
            ></section>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
